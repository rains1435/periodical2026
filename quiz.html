<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f5f5f5;
      padding: 40px 16px;
      font-family: sans-serif;
    }

    .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }

    .question-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .question-text {
      font-weight: 600;
      margin-bottom: 16px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .option:hover {
      background-color: #f9f9f9;
    }

    .btn-submit {
      background-color: #1a1a1a;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn-submit:hover {
      background-color: #333;
    }
  </style>
</head>
<body>

  <div class="container" style="max-width: 760px;">

    <p class="eyebrow">Check Your Knowledge</p>
    <h1 class="fw-bold mb-1">Unit Quiz</h1>
    <p class="text-muted mb-4">Select the best answer for each question to test your understanding.</p>

    <!-- Question 1 -->
    <div class="question-card">
      <p class="question-text">1. This is a question?</p>
      <label class="option"><input type="radio" name="q1" value="a"/> Answer A</label>
      <label class="option"><input type="radio" name="q1" value="b"/> Answer B</label>
      <label class="option"><input type="radio" name="q1" value="c"/> Answer C</label>
      <label class="option"><input type="radio" name="q1" value="d"/> Answer D</label>
    </div>

    <!-- Question 2 -->
    <div class="question-card">
      <p class="question-text">2. This is a question?</p>
      <label class="option"><input type="radio" name="q2" value="a"/> Answer A</label>
      <label class="option"><input type="radio" name="q2" value="b"/> Answer B</label>
      <label class="option"><input type="radio" name="q2" value="c"/> Answer C</label>
      <label class="option"><input type="radio" name="q2" value="d"/> Answer D</label>
    </div>

    <!-- Question 3 -->
    <div class="question-card">
      <p class="question-text">3. This is a question?</p>
      <label class="option"><input type="radio" name="q3" value="a"/> Answer A</label>
      <label class="option"><input type="radio" name="q3" value="b"/> Answer B</label>
      <label class="option"><input type="radio" name="q3" value="c"/> Answer C</label>
      <label class="option"><input type="radio" name="q3" value="d"/> Answer D</label>
    </div>

    <button class="btn-submit">Submit</button>

  </div>

</body>
</html>
