    <style>
      /* CSS */
      body {
        height: 100vh !important;
      }

      .elementspan {
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        border: 2px solid black;
        cursor: pointer;
        width: 50px;
        height: 50px;
      }

      .idk {
        display: flex;
        width: 100%;
        justify-content: space-between;
        padding: 0px 50px;
      }

      @media (max-width: 1115px) {
        .idk {
            display: flex;
            flex-direction: column;
        }

        #canvas {
            display: flex;
            flex-direction: column;
        }
        h3{
            width:100vw;
        }
        p{
            /* font-size: 10rem; */
            width: 100%;
        }
        #description{
            width:90vw;
            font-size:14.5px
        }
      }
      .top {
        margin-top: 1vw;
      }
      .sec {
        display: flex;
        flex-direction: column;
      }

      .elements {
        display: flex;
        gap: 2px;
      }
      .information {
        width: 50vw;
      }
      h3 {
        margin-left: 10vw;
        font-size:23px !important;
        margin-top:0.2vw;
      }
      #description {
        margin-left: 2vw;
        margin-right: 2vw;
        /* font-size: 20px; */
      }
      h1{
        text-align:center
      }
      @media (max-width:1200px) and (min-width:401px){
        h1{
            text-align:left;
            margin-left:111px
        }
      }
      @media(max-width:400px){
        h1{
            text-align:center;
        }
      }

    </style>

    <title>Title</title>
  </head>
  <body>
    <!-- HTML -->
      <nav class="navbar bg-body-tertiary navbar-expand-lg shadow" data-bs-theme="light">

    <div class="idk">
      <div class="sec metals">
        <h1 class = "inter-bold">Metals</h1>
        <div class="elements temp " id="metals"></div>
      </div>
      <div class="sec metalloids">
        <h1 class = "inter-bold">Metalloids</h1>
        <div class="elements temp" id="metalloids"></div>
      </div>
      <div classs="sec">
        <h1 class = "inter-bold">Nonmetals</h1>
        <div class="elements temp" id="nonmetals"></div>
      </div>
    </div>
    <div style="display: flex" id="canvas">
      <div class="information sec">
        <h3 id="name" class = "inter-regular"></h3>
        <h3 id="symbol" class = "inter-regular"></h3>
        <h3 id="number" class = "inter-regular"></h3>
        <p id="description" class = "inter-regular"></p>
      </div>
      <div id="theCanvas" class="top"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script>
      // JS

      const elements = [
        {
          name: "Hydrogen",
          atomicNumber: 1,
          symbol: "H",
          description: `Discovery: Hydrogen was discovered in 1766 by Henry Cavendish <br> Roots of its name: Came from the Greek word "Hydro", which means water, and "Genes", which means creator. Together it means "water-former" <br> Interesting fact/trivia: Hydrogen can turn into a metal at extremely high pressures.`,
          type: "nonmetal",
        },
        {
          name: "Helium",
          atomicNumber: 2,
          symbol: "He",
          description: `Discovery: Helium was discovered in 1868 by Sir William Ramsey. <br> Roots of its name: Named after Helios, the Greek sun god. <br> Interesting fact/trivia: Sound travels faster in helium than it does oxygen, and it lets your vocal cords vibrate more and this is what makes your voice squeaky when you breathe it in.`,
          type: "nonmetal",
        },
        {
          name: "Lithium",
          atomicNumber: 3,
          symbol: "Li",
          description: `Discovery: Lithium was discovered in 1817 by Johan August Arfwedson. <br> Roots of its name: From the Greek word "lithos," which means "stone". Was called this because it was discovered in a solid mineral instead of a plant. <br>
                    Interesting fact/trivia: Its one of only three elements created in significant amounts during the Big Bang, alongside hydrogen and helium. Some of the lithium on Earth today is 13.8 billion year old cosmic leftovers. (If the 13.8 billion years measured as a year the whole of human history would just be the last 2 seconds.)

`,
          type: "metal",
        },
        {
          name: "Nitrogen",
          atomicNumber: 7,
          symbol: "N",
          description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
          type: "nonmetal",
        },
        {
          name: "Oxygen",
          atomicNumber: 8,
          symbol: "O",
          description: `Discovery: Oxygen was discovered in August 1st 1774 by Joseph Priestley.  <br> Roots of its name: Its name means acid former because Antoine Lavoisier believed Oxygen was an essential component of all acid <br> Interesting fact/trivia: Oxygen is the most abundant element in the Earth's crust; over 46% of the weight of the earth's crust is Oxygen!!!`,
          type: "nonmetal",
        },
        {
          name: "Phosphorus",
          atomicNumber: 15,
          symbol: "P",
          description: `Discovery: Phosphorus was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
          type: "nonmetal",
        },
        {
          name: "Sulfur",
          atomicNumber: 16,
          symbol: "S",
          description: `Discovery: Sulfur was discovered in 1777 by Antoine Lavoisier. <br> Roots of its name: The name sulfur comes from the Latin word sulfurium (or sulphur), which referred to brimstone or burning sulfur. <br> Interesting fact/trivia: Sulfur is one of the few elements that can burn with a bright blue flame, which is why sulfur fires near volcanoes can glow blue at night.`,
          type: "nonmetal",
        },
        {
          name: "Argon",
          atomicNumber: 18,
          symbol: "Ar",
          description: `Discovery: Argon was discovered in 1894 by Sir William Ramsay and Lord Rayleigh. <br> Roots of its name: A Greek word that means “lazy” or “inactive”. <br> Interesting fact/trivia: Argon is used for lasers, plasma balls, light bulbs, and rocket propellants.`,
          type: "nonmetal",
        },
        {
          name: "Potassium",
          atomicNumber: 19,
          symbol: "K",
          description: `Discovery: Potassium was discovered in 1807 by English chemist Sir Humphry Davy <br> Roots of its name: The name is deruved from the English word "Potash". <br> Interesting fact/trivia: The average adult human consumes 2640 mg of potassium daily (3,400 mg for men, 2,600 mg for women). A medium-sized banana contains about 422 mg of potassium. There are other great sources of food that contains potassium, such as, baked potato (20% of the daily value), dried apricots (16% of the daily value), lentils (16% of the daily value), kidney beans (15% of the daily value), and so forth.`,
          type: "metal",
        },
        {
          name: "Calcium",
          atomicNumber: 20,
          symbol: "Ca",
          description: `Discovery: Calcium was discovered by Sir Humphry Davy in 1808 <br> Roots of its name: Calcium was first found within limestone (CaO and mercuric oxide), hence the name Calcium which is derived from the Latin word “calx”, meaning lime. <br> Interesting fact/trivia: Calcium is the most abundant mineral in the human body, with 99% stored in bones and teeth, and making up to roughly 2 pounds of an average adult’s body.`,
          type: "metal",
        },
        {
          name: "Bromine",
          atomicNumber: 35,
          symbol: "Br",
          description: `Discovery: Bromine was discovered in 1825 by French chemist Antoine-Jerome Balard and German chemist Carl Jacob Lowig <br> Roots of its name: Came from the Greek word bromos that means stench and added the suffix -ine. <br> Interesting fact/trivia: Bromine was used as a chemical weapon in WWI in the form of tear gas. It causes burning sensation, coughing, sneezing, shortness of breath and rashes.`,
          type: "nonmetal",
        },
        {
          name: "Silver",
          atomicNumber: 47,
          symbol: "Ag",
          description: `Discovery: Silver was discovered around 3000 BCE in Anatolia by multiple people. <br> Roots of its name: Old English seolfor, which itself evolved from the Proto-Germanic word silubra, means silver. <br> Interesting fact/trivia: Silver is an unmatched conductor. Silver scores 100% on the scale of electrical conductivity, with copper coming in second at 97%.`,
          type: "metal",
        },
        {
          name: "Cesium",
          atomicNumber: 55,
          symbol: "Cs",
          description: `Discovery: Cesium was discovered in May 10, 1860, by Robert Bunsen and Gustav Kirchoff <br> Roots of its name: The name “cesium” comes from the Latin word caesius, meaning “sky blue,” because of the bright blue spectral lines seen when it was discovered. <br> Interesting fact/trivia: Cesium-133 is used to define the length of one second. Scientists measure a second using the vibrations of cesium atoms in atomic clocks. Exactly 9,192,631,770 vibrations of Cesium-133 are what defines a second 1 second. The way this is tested is through the use of microwaves to make cesium atoms “tick.” When the microwave frequency matches the atom perfectly, the atoms react strongly, and that exact frequency is used to keep time. This is very very accurate. Lose about 1 second in 100 million years.`,
          type: "metal",
        },
        {
          name: "Gold",
          atomicNumber: 79,
          symbol: "Au",
          description: `Discovery: Gold was discovered since the dawn of time by the people living in the old world. <br> Roots of its name: Gold is named after the Anglo-Saxon word for metal. <br> Interesting fact/trivia: Synthetic Gold was first created by a Japanese physicist, who used neutron bombardment to transform mercury into gold. This came at a very expensive cost, as the cost to produce one ounce of it ranged from trillions to one quadrillion dollars, while Gold itself is only about 3000 dollars per ounce. A similar process happened years later in 1980, when Glenn Seaborg transmuted bismuth into gold using a particle accelerator, but the cost still came to about 1 quadrillion dollars per ounce.`,
          type: "metal",
        },
        {
          name: "Lawrencium",
          atomicNumber: 103,
          symbol: "Lr",
          description: `Discovery: Lawrencium was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
          type: "metal",
        },
      ];

      var atomicName;
      var atomicSymbol;
      var atomicNumber;
      var description;
      var clicked = false;
      var typeOfElement;
      elements.forEach(function (el) {
        const newSpan = document.createElement("span");
        newSpan.innerHTML = el.symbol;
        newSpan.id = el.atomicNumber;
        newSpan.classList.add("elementspan");
        newSpan.setAttribute("data-atomic-number", el.atomicNumber);
        newSpan.setAttribute("data-symbol", el.symbol);
        newSpan.setAttribute("data-desc", el.description);
        newSpan.setAttribute("data-atomic-name", el.name);
        newSpan.setAttribute("data-type", el.type);
        const metalloids = document.querySelector("#metalloids");
        const nonmetals = document.querySelector("#nonmetals");
        if (el.type === "metalloid") {
          metalloids.appendChild(newSpan);
        } else if (el.type === "nonmetal") {
          nonmetals.appendChild(newSpan);
        } else {
          metals.appendChild(newSpan);
        }
      });
      document.querySelectorAll(".elementspan").forEach(function (eachElement) {
        eachElement.addEventListener("click", function (event) {
          atomicName = event.target.dataset.atomicName;
          atomicSymbol = event.target.dataset.symbol;
          atomicNumber = event.target.dataset.atomicNumber;
          description = event.target.dataset.desc;
          typeOfElement = event.target.dataset.type;
          clicked = true;
          document.querySelector("#name").innerHTML =
            "Atomic Name: " + atomicName;
          document.querySelector("#symbol").innerHTML =
            "Atomic Symbol: " + atomicSymbol;
          document.querySelector("#number").innerHTML =
            "Atomic Number: " + atomicNumber;
          document.querySelector("#description").innerHTML = description;
        });
      });
      var w = 700;
      var h = 440;
      function setup() {
        if (window.innerWidth <= 1115){
            w = window.innerWidth
        }
        var canvas = createCanvas(w, h);
        canvas.parent("theCanvas");
        frameRate(5);
      }

      function draw() {
        if (clicked == true) {
          background(200);
          if (atomicSymbol == "Hg" || atomicSymbol == "Br") {
            for (var x = 10; x < width - 5; x += 12) {
              for (var y = height * 0.75; y < height; y += 10) {
                ellipse(x + random(-5, 5), y + random(-5, 5), 10);
              }
            }
          } else if (typeOfElement == "metal" || typeOfElement == "metalloid") {
            for (var x = 10; x < width - 5; x += 12) {
              for (var y = height * 0.75; y < height; y += 10) {
                ellipse(x, y, 10);
              }
            }
          } else if (typeOfElement == "nonmetal") {
            for (var x = 10; x < width - 5; x += 50) {
              for (var y = 10; y < height-2.5; y += 50) {
                if (random(100) > 50) {
                  ellipse(x + random(-5, 5), y + random(-5, 5), 10);
                }
              }
            }
          }
        }
      }
    </script>
  </body>
</html>
